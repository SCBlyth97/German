<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141318" />
  <meta name="description" content="German vocabulary flashcards with spaced repetition" />
  <title>Deutsch</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <span class="header-title">Deutsch</span>
    <div class="header-right">
      <div class="session-counter" id="sessionCounter" aria-label="Cards remaining this session">
        <span id="sessionCount">–</span> left
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Open settings">⚙</button>
    </div>
  </header>

  <!-- ===== PROGRESS BAR ===== -->
  <div class="progress-bar-wrap" role="progressbar" aria-label="Vocabulary progress">
    <div class="progress-bar-fill" id="progressFill"></div>
    <span class="progress-label" id="progressLabel">0 / 0 learned</span>
  </div>

  <!-- ===== MAIN CONTENT AREA ===== -->
  <main class="main" id="main">

    <!-- Loading state -->
    <div class="state-screen" id="loadingScreen">
      <p class="state-message muted">Loading…</p>
    </div>

    <!-- Error state -->
    <div class="state-screen hidden" id="errorScreen">
      <p class="state-message">Could not load words.</p>
      <p class="muted" id="errorDetail"></p>
      <button class="btn btn-secondary" onclick="location.reload()">Retry</button>
    </div>

    <!-- Done screen -->
    <div class="state-screen hidden" id="doneScreen">
      <div class="done-icon">✓</div>
      <h2 class="done-title">Session complete!</h2>
      <div class="done-stats" id="doneStats"></div>
      <button class="btn btn-primary" id="moreBtn">Study more new words</button>
    </div>

    <!-- Flashcard -->
    <div class="card-scene hidden" id="cardScene">
      <!-- The 3-D flip container -->
      <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard — tap to flip">

        <!-- FRONT FACE -->
        <div class="card-face card-front" id="cardFront">
          <div class="card-top-border" id="frontBorder"></div>
          <div class="card-body">
            <span class="type-pill" id="frontPill"></span>
            <p class="word-de" id="frontWordDe"></p>
            <button class="listen-btn" id="listenBtn" aria-label="Listen to German pronunciation">
              <span class="listen-icon">🔊</span> Hören
            </button>
            <p class="hint-text">Tap card to reveal</p>
          </div>
        </div>

        <!-- BACK FACE -->
        <div class="card-face card-back" id="cardBack">
          <div class="card-top-border" id="backBorder"></div>
          <div class="card-body">
            <span class="type-pill" id="backPill"></span>
            <p class="word-de back-word-de" id="backWordDe"></p>
            <p class="word-forms" id="backForms"></p>
            <p class="word-en" id="backWordEn"></p>
            <div class="example-block" id="exampleBlock">
              <p class="example-de" id="backExampleDe"></p>
              <p class="example-en" id="backExampleEn"></p>
            </div>
            <div class="answer-btns">
              <button class="btn btn-wrong" id="btnDidntKnow">Didn't know</button>
              <button class="btn btn-right" id="btnKnewIt">Knew it ✓</button>
            </div>
          </div>
        </div>

      </div><!-- /card -->
    </div><!-- /card-scene -->

  </main>

  <!-- ===== SETTINGS SHEET ===== -->
  <div class="sheet-backdrop hidden" id="sheetBackdrop"></div>
  <div class="settings-sheet hidden" id="settingsSheet" role="dialog" aria-label="Settings">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Settings</h2>

    <div class="setting-row">
      <label class="setting-label">New cards per day</label>
      <div class="stepper">
        <button class="stepper-btn" id="stepperDown" aria-label="Decrease">−</button>
        <span class="stepper-val" id="stepperVal">20</span>
        <button class="stepper-btn" id="stepperUp" aria-label="Increase">+</button>
      </div>
    </div>

    <!-- Colour key legend -->
    <div class="legend">
      <h3 class="legend-title">Colour key</h3>
      <div class="legend-items">
        <div class="legend-item"><span class="legend-dot" style="background:#6aa0ff"></span> der (masculine)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f0697f"></span> die (feminine)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#57c08a"></span> das (neuter)</div>
        <div class="legend-item"><span class="legend-dot" style="background:#b39bf2"></span> verb</div>
      </div>
    </div>

    <!-- Reset -->
    <div class="reset-section">
      <button class="btn btn-danger" id="resetBtn">Reset all progress</button>
      <div class="reset-confirm hidden" id="resetConfirm">
        <p class="reset-warning">This will erase all progress. Are you sure?</p>
        <div class="reset-confirm-btns">
          <button class="btn btn-secondary" id="resetCancelBtn">Cancel</button>
          <button class="btn btn-danger" id="resetConfirmBtn">Yes, reset</button>
        </div>
      </div>
    </div>

    <button class="btn btn-secondary sheet-close-btn" id="sheetCloseBtn">Close</button>
  </div>

  <script src="./app.js"></script>

  <script>
    // Register service worker with relative path so it works at /german/
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' })
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
